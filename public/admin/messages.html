<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Messages - Admin</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px 0; }
        .message-card { background: white; border-radius: 8px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .message-header { display: flex; justify-content: space-between; margin-bottom: 10px; padding-bottom: 10px; border-bottom: 1px solid #eee; }
        .message-subject { font-size: 1.2rem; font-weight: bold; color: #667eea; }
        .message-meta { color: #666; font-size: 0.9rem; }
        .message-content { margin-top: 10px; line-height: 1.5; }
        .status-badge { display: inline-block; padding: 3px 8px; border-radius: 12px; font-size: 0.75rem; }
        .status-unread { background: #fed7d7; color: #742a2a; }
        .status-read { background: #c6f6d5; color: #22543d; }
        .refresh-btn { background: #667eea; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin-bottom: 20px; }
        .refresh-btn:hover { background: #5a67d8; }
        .back-btn { background: #48bb78; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin-bottom: 20px; margin-right: 10px; text-decoration: none; display: inline-block; }
        .back-btn:hover { background: #38a169; }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <h1>📬 Contact Messages</h1>
            <p>View messages from your students</p>
        </div>
    </header>
    
    <main class="container">
        <a href="/admin" class="back-btn">← Back to Dashboard</a>
        <button class="refresh-btn" onclick="loadMessages()">🔄 Refresh Messages</button>
        
        <div id="messages-container">
            <p>Loading messages...</p>
        </div>
    </main>
    
    <script>
        async function loadMessages() {
            const container = document.getElementById('messages-container');
            container.innerHTML = '<p>Loading messages...</p>';
            
            try {
                const response = await fetch('/api/admin/contacts');
                
                if (response.status === 401) {
                    container.innerHTML = '<p style="color: red;">⚠️ Authentication required. Please log in to the admin panel first.</p>';
                    return;
                }
                
                const messages = await response.json();
                
                if (messages.length === 0) {
                    container.innerHTML = '<p>📭 No messages yet. Check back later!</p>';
                    return;
                }
                
                container.innerHTML = '';
                
                messages.forEach(msg => {
                    const card = document.createElement('div');
                    card.className = 'message-card';
                    card.innerHTML = `
                        <div class="message-header">
                            <div>
                                <span class="message-subject">${escapeHtml(msg.subject)}</span>
                                <span class="status-badge status-${msg.status}">${msg.status}</span>
                            </div>
                            <div class="message-meta">${new Date(msg.created_at).toLocaleString()}</div>
                        </div>
                        <div class="message-meta">
                            <strong>From:</strong> ${escapeHtml(msg.name)} (${escapeHtml(msg.email)})
                        </div>
                        <div class="message-content">
                            ${escapeHtml(msg.message).replace(/\n/g, '<br>')}
                        </div>
                    `;
                    container.appendChild(card);
                });
            } catch (error) {
                container.innerHTML = '<p style="color: red;">❌ Error loading messages. Make sure you are logged in as admin.</p>';
                console.error('Error:', error);
            }
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Load messages on page load
        loadMessages();
        
        // Auto-refresh every 30 seconds
        setInterval(loadMessages, 30000);
    </script>
</body>
</html>
