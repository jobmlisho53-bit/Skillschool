<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Library - Skill to Income</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f8fafc;
            color: #1a1a2e;
            line-height: 1.6;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
        }
        
        /* Header */
        .header {
            background: white;
            border-bottom: 1px solid #eaeaea;
            padding: 60px 0 40px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 12px;
            font-weight: 700;
            letter-spacing: -0.01em;
        }
        
        .header p {
            color: #4a5568;
            font-size: 1.1rem;
        }
        
        /* Navigation */
        .top-nav {
            background: white;
            padding: 16px 0;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid #eaeaea;
        }
        
        .nav-links {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo {
            font-weight: 700;
            font-size: 1.25rem;
            color: #1a1a2e;
        }
        
        .nav-link {
            color: #4a5568;
            text-decoration: none;
            margin-left: 24px;
            font-weight: 500;
        }
        
        .nav-link:hover {
            color: #2563eb;
        }
        
        /* Course Grid */
        .courses-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 30px;
            padding: 60px 0;
        }
        
        .course-card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            transition: all 0.2s;
            border: 1px solid #eaeaea;
            cursor: pointer;
        }
        
        .course-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 24px rgba(0,0,0,0.08);
            border-color: #cbd5e1;
        }
        
        .course-card h3 {
            font-size: 1.25rem;
            margin-bottom: 12px;
            font-weight: 600;
            color: #1a1a2e;
        }
        
        .course-card p {
            color: #6b7280;
            margin-bottom: 16px;
            font-size: 0.9rem;
        }
        
        .progress-container {
            background: #e5e7eb;
            border-radius: 8px;
            height: 6px;
            margin: 16px 0;
            overflow: hidden;
        }
        
        .progress-fill {
            background: #2563eb;
            height: 100%;
            transition: width 0.3s;
            border-radius: 8px;
        }
        
        .progress-text {
            font-size: 0.75rem;
            color: #6b7280;
            text-align: right;
        }
        
        .course-meta {
            display: flex;
            justify-content: space-between;
            margin-top: 16px;
            font-size: 0.8rem;
            color: #9ca3af;
        }
        
        .footer {
            background: #1a1a2e;
            color: #9ca3af;
            text-align: center;
            padding: 40px 0;
            margin-top: 40px;
        }
        
        .footer a {
            color: #9ca3af;
            text-decoration: none;
            margin: 0 12px;
        }
        
        .loading {
            text-align: center;
            padding: 60px;
            color: #6b7280;
        }
        
        @media (max-width: 768px) {
            .courses-grid {
                grid-template-columns: 1fr;
            }
            
            .header h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="top-nav">
        <div class="container">
            <div class="nav-links">
                <div class="logo">Skill to Income</div>
                <div>
                    <a href="/" class="nav-link">Home</a>
                    <a href="/courses" class="nav-link">Courses</a>
                </div>
            </div>
        </div>
    </div>

    <div class="header">
        <div class="container">
            <h1>Course Library</h1>
            <p>Professional skills training. Self-paced. Completely free.</p>
        </div>
    </div>

    <div class="container">
        <div id="courses-container" class="courses-grid">
            <div class="loading">Loading courses...</div>
        </div>
    </div>

    <div class="footer">
        <div class="container">
            <p>© 2026 Skill to Income. Professional skills training.</p>
            <p style="margin-top: 16px;">
                <a href="/privacy">Privacy</a> | 
                <a href="/terms">Terms</a> | 
                <a href="/contact">Contact</a>
            </p>
        </div>
    </div>

    <script>
        let userId = null;
        
        function getUserId() {
            let id = localStorage.getItem('user_id');
            if (!id) {
                id = 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
                localStorage.setItem('user_id', id);
            }
            return id;
        }
        
        userId = getUserId();
        
        async function loadCourses() {
            try {
                const response = await fetch('/api/modules');
                const courses = await response.json();
                
                const container = document.getElementById('courses-container');
                
                if (courses.length === 0) {
                    container.innerHTML = '<div class="loading">No courses available yet. Check back soon.</div>';
                    return;
                }
                
                container.innerHTML = '';
                
                for (const course of courses) {
                    const moduleId = course.module_id || course.moduleId;
                    const progressResponse = await fetch(`/api/progress/${userId}/${moduleId}`);
                    const progress = await progressResponse.json();
                    
                    const card = document.createElement('div');
                    card.className = 'course-card';
                    card.onclick = () => {
                        window.location.href = `/courses?module=${moduleId}`;
                    };
                    
                    card.innerHTML = `
                        <h3>${escapeHtml(course.title)}</h3>
                        <p>${escapeHtml(course.description || 'Comprehensive professional training.')}</p>
                        <div class="progress-container">
                            <div class="progress-fill" style="width: ${progress.percentage}%"></div>
                        </div>
                        <div class="progress-text">${progress.completed}/${progress.total} lessons completed</div>
                        <div class="course-meta">
                            <span>⏱️ ${escapeHtml(course.estimatedTime || 'Self-paced')}</span>
                            <span>${progress.percentage}% complete</span>
                        </div>
                    `;
                    container.appendChild(card);
                }
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('courses-container').innerHTML = '<div class="loading">Unable to load courses. Please try again.</div>';
            }
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        loadCourses();
    </script>
</body>
</html>
