<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Income School - Professional Skills Mastery</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #ffffff;
            color: #1a1a1a;
            line-height: 1.5;
        }
        
        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 32px;
        }
        
        .header {
            background: #ffffff;
            border-bottom: 1px solid rgba(212, 175, 55, 0.15);
            padding: 20px 0;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.98);
        }
        
        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }
        
        .logo h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.6rem;
            font-weight: 600;
            background: linear-gradient(135deg, #1a1a1a 0%, #c9a03d 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .logo p {
            font-size: 0.7rem;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: #c9a03d;
        }
        
        .courses-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
            gap: 32px;
            padding: 48px 0;
        }
        
        .course-card {
            background: #ffffff;
            border-radius: 8px;
            padding: 28px;
            transition: all 0.3s ease;
            border: 1px solid rgba(212, 175, 55, 0.2);
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }
        
        .course-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, #c9a03d, #f5e6b8);
            transform: scaleX(0);
            transition: transform 0.3s ease;
        }
        
        .course-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.08);
            border-color: rgba(212, 175, 55, 0.4);
        }
        
        .course-card:hover::before {
            transform: scaleX(1);
        }
        
        .course-category {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 500;
            color: #c9a03d;
            margin-bottom: 12px;
        }
        
        .course-card h3 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 12px;
            color: #1a1a1a;
        }
        
        .course-description {
            color: #6b6b6b;
            font-size: 0.85rem;
            line-height: 1.5;
            margin-bottom: 20px;
        }
        
        .progress-section {
            margin: 20px 0 16px;
        }
        
        .progress-bar-container {
            background: #f0f0f0;
            border-radius: 2px;
            height: 2px;
            overflow: hidden;
        }
        
        .progress-bar-fill {
            background: linear-gradient(90deg, #c9a03d, #f5e6b8);
            height: 100%;
            transition: width 0.3s ease;
            border-radius: 2px;
        }
        
        .progress-text {
            font-size: 0.7rem;
            color: #c9a03d;
            margin-top: 8px;
            text-align: right;
            font-weight: 500;
        }
        
        .course-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            padding-top: 16px;
            border-top: 1px solid rgba(212, 175, 55, 0.15);
        }
        
        .course-duration {
            font-size: 0.75rem;
            color: #9a9a9a;
        }
        
        .start-link {
            font-size: 0.8rem;
            font-weight: 500;
            color: #c9a03d;
            text-decoration: none;
            transition: opacity 0.2s;
        }
        
        .back-button {
            background: none;
            border: none;
            font-family: 'Inter', sans-serif;
            font-size: 0.8rem;
            font-weight: 500;
            color: #c9a03d;
            cursor: pointer;
            padding: 12px 0;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: opacity 0.2s;
            margin: 24px 0 16px;
        }
        
        .lesson-item {
            background: #ffffff;
            padding: 20px;
            margin: 12px 0;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid rgba(212, 175, 55, 0.15);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .lesson-item:hover {
            border-color: rgba(212, 175, 55, 0.4);
            background: #fefcf8;
        }
        
        .lesson-completed {
            border-left: 2px solid #c9a03d;
            background: #fefcf8;
        }
        
        .complete-badge {
            background: #c9a03d;
            color: #ffffff;
            padding: 4px 12px;
            border-radius: 2px;
            font-size: 0.65rem;
            font-weight: 500;
        }
        
        .lesson-content {
            background: #ffffff;
            border-radius: 8px;
            padding: 32px;
            margin: 24px 0;
            border: 1px solid rgba(212, 175, 55, 0.2);
        }
        
        .mark-complete-btn {
            background: #c9a03d;
            color: #ffffff;
            border: none;
            padding: 14px 32px;
            border-radius: 2px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-size: 0.8rem;
            font-weight: 500;
            letter-spacing: 0.5px;
            transition: all 0.2s;
            margin-top: 24px;
        }
        
        .mark-complete-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .mark-complete-btn:hover:not(:disabled) {
            background: #b8922e;
            transform: translateY(-1px);
        }
        
        .video-container {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            margin: 24px 0;
            border-radius: 4px;
        }
        
        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 4px;
        }
        
        .watch-progress {
            margin-top: 12px;
        }
        
        .watch-progress-bar-container {
            background: #f0f0f0;
            border-radius: 2px;
            height: 4px;
        }
        
        .watch-progress-fill {
            width: 0%;
            background: #c9a03d;
            height: 100%;
            border-radius: 2px;
            transition: width 0.3s;
        }
        
        .watch-progress-stats {
            display: flex;
            justify-content: space-between;
            margin-top: 8px;
        }
        
        .watch-progress-label {
            font-size: 0.7rem;
            color: #9a9a9a;
        }
        
        .watch-progress-percent {
            font-size: 0.7rem;
            color: #c9a03d;
            font-weight: 500;
        }
        
        .footer {
            background: #ffffff;
            border-top: 1px solid rgba(212, 175, 55, 0.15);
            padding: 48px 0 32px;
            margin-top: 64px;
        }
        
        .footer-content {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 32px;
        }
        
        .footer-links {
            display: flex;
            gap: 32px;
            flex-wrap: wrap;
        }
        
        .footer a {
            color: #6b6b6b;
            text-decoration: none;
            font-size: 0.8rem;
        }
        
        .footer a:hover {
            color: #c9a03d;
        }
        
        .copyright {
            font-size: 0.75rem;
            color: #9a9a9a;
        }
        
        .hidden {
            display: none !important;
        }
        
        .loading {
            text-align: center;
            padding: 60px;
            color: #c9a03d;
        }
        
        @media (max-width: 768px) {
            .container {
                padding: 0 20px;
            }
            .courses-grid {
                grid-template-columns: 1fr;
            }
            .lesson-item {
                flex-direction: column;
                gap: 12px;
                text-align: center;
            }
            .footer-content {
                flex-direction: column;
                text-align: center;
            }
            .footer-links {
                justify-content: center;
            }
        }
    </style>
    <script>
        window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
    <script defer src="/_vercel/speed-insights/script.js"></script>
</head>
<body>
    <div class="header">
        <div class="container">
            <div class="header-content">
                <div class="logo">
                    <h1>Income School</h1>
                    <p>Professional Skills Mastery</p>
                </div>
            </div>
        </div>
    </div>

    <main class="container">
        <section id="courses-section">
            <div id="courses-container" class="courses-grid">
                <div class="loading">Loading courses...</div>
            </div>
        </section>

        <section id="lessons-section" class="hidden">
            <button id="back-to-courses" class="back-button">← Back to Courses</button>
            <h2 id="course-title" style="font-family: 'Cormorant Garamond', serif; font-size: 1.8rem; font-weight: 600;"></h2>
            <div id="course-description"></div>
            <div class="progress-section" id="module-progress-container" style="display: none;">
                <div class="progress-bar-container">
                    <div class="progress-bar-fill" id="module-progress-fill" style="width: 0%"></div>
                </div>
                <div class="progress-text" id="module-progress-text"></div>
            </div>
            <h3 style="margin: 32px 0 16px; font-weight: 500; font-size: 1rem; letter-spacing: 1px; color: #c9a03d;">CURRICULUM</h3>
            <div id="lessons-list"></div>
        </section>

        <section id="player-section" class="hidden">
            <button id="back-to-lessons" class="back-button">← Back to Lessons</button>
            <h2 id="lesson-title" style="font-family: 'Cormorant Garamond', serif; font-size: 1.5rem; font-weight: 500;"></h2>
            <div id="lesson-player"></div>
            <button id="mark-complete-btn" class="mark-complete-btn" disabled>Mark as Complete</button>
        </section>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="copyright">© 2026 Income School. All rights reserved.</div>
                <div class="footer-links">
                    <a href="/privacy">Privacy</a>
                    <a href="/terms">Terms</a>
                    <a href="/contact">Contact</a>
                </div>
            </div>
        </div>
    </footer>

    <div id="feedbackModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center;">
        <div style="background: white; padding: 32px; border-radius: 6px; max-width: 500px; width: 90%; border-top: 3px solid #c9a03d;">
            <h2 style="font-family: 'Cormorant Garamond', serif; margin-bottom: 16px;">Module Feedback</h2>
            <p style="margin-bottom: 20px; color: #6b6b6b;">Help us improve this course</p>
            <div style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 8px; font-weight: 500;">Was this module helpful?</label>
                <div id="helpful-stars" style="display: flex; gap: 8px;">
                    <span data-value="1" style="font-size: 28px; cursor: pointer; color: #ddd;">★</span>
                    <span data-value="2" style="font-size: 28px; cursor: pointer; color: #ddd;">★</span>
                    <span data-value="3" style="font-size: 28px; cursor: pointer; color: #ddd;">★</span>
                    <span data-value="4" style="font-size: 28px; cursor: pointer; color: #ddd;">★</span>
                    <span data-value="5" style="font-size: 28px; cursor: pointer; color: #ddd;">★</span>
                </div>
            </div>
            <div style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 8px; font-weight: 500;">What confused you? (Optional)</label>
                <textarea id="confusion" rows="3" style="width: 100%; padding: 12px; border: 1px solid rgba(212,175,55,0.3); border-radius: 4px; font-family: inherit;"></textarea>
            </div>
            <div style="margin-bottom: 24px;">
                <label style="display: block; margin-bottom: 8px; font-weight: 500;">Suggestions for improvement (Optional)</label>
                <textarea id="suggestions" rows="3" style="width: 100%; padding: 12px; border: 1px solid rgba(212,175,55,0.3); border-radius: 4px; font-family: inherit;"></textarea>
            </div>
            <div style="display: flex; gap: 12px;">
                <button onclick="submitFeedback()" style="background: #c9a03d; color: white; border: none; padding: 12px 24px; border-radius: 2px; cursor: pointer; font-family: inherit; font-weight: 500;">Submit Feedback</button>
                <button onclick="closeFeedbackModal()" style="background: none; border: 1px solid rgba(212,175,55,0.3); padding: 12px 24px; border-radius: 2px; cursor: pointer; font-family: inherit;">Skip</button>
            </div>
        </div>
    </div>

    <script>
        let currentCourse = null;
        let currentLesson = null;
        let currentLessons = [];
        let userId = null;
        let selectedRating = 0;
        
        // YouTube tracking variables
        let youtubePlayer = null;
        let watchInterval = null;
        let watchedSeconds = 0;
        let totalDuration = 0;
        let watchPercentage = 0;
        let isTracking = false;
        
        function getUserId() {
            let id = localStorage.getItem('user_id');
            if (!id) {
                id = 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
                localStorage.setItem('user_id', id);
            }
            return id;
        }
        
        userId = getUserId();
        
        async function loadCourses() {
            try {
                const response = await fetch('/api/modules');
                const courses = await response.json();
                const container = document.getElementById('courses-container');
                
                if (courses.length === 0) {
                    container.innerHTML = '<div class="loading">No courses available yet. Check back soon!</div>';
                    return;
                }
                
                container.innerHTML = '';
                
                for (const course of courses) {
                    const moduleId = course.module_id || course.moduleId;
                    const progress = await getModuleProgress(moduleId);
                    
                    const card = document.createElement('div');
                    card.className = 'course-card';
                    card.onclick = () => showCourse(course);
                    
                    card.innerHTML = `
                        <div class="course-category">${course.category || 'Professional Course'}</div>
                        <h3>${escapeHtml(course.title)}</h3>
                        <p class="course-description">${escapeHtml(course.description || 'Master this professional skill with our comprehensive curriculum.')}</p>
                        <div class="progress-section">
                            <div class="progress-bar-container">
                                <div class="progress-bar-fill" style="width: ${progress.percentage}%"></div>
                            </div>
                            <div class="progress-text">${progress.completed}/${progress.total} lessons completed</div>
                        </div>
                        <div class="course-meta">
                            <span class="course-duration">${escapeHtml(course.estimatedTime || 'Self-paced')}</span>
                            <span class="start-link">Continue →</span>
                        </div>
                    `;
                    container.appendChild(card);
                }
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('courses-container').innerHTML = '<div class="loading">Unable to load courses. Please refresh the page.</div>';
            }
        }
        
        async function getModuleProgress(moduleId) {
            try {
                const response = await fetch(`/api/progress/${userId}/${moduleId}`);
                const data = await response.json();
                return data;
            } catch (error) {
                return { total: 0, completed: 0, percentage: 0 };
            }
        }
        
        async function showCourse(course) {
            currentCourse = course;
            const moduleId = course.module_id || course.moduleId;
            
            document.getElementById('course-title').textContent = course.title;
            document.getElementById('course-description').innerHTML = `
                <div style="background: #fefcf8; padding: 24px; border-radius: 4px; margin: 20px 0; border-left: 2px solid #c9a03d;">
                    <p>${escapeHtml(course.description || 'No description available')}</p>
                    <p style="margin-top: 12px;"><strong>Estimated time:</strong> ${escapeHtml(course.estimatedTime || 'Self-paced')}</p>
                </div>
            `;
            
            try {
                const response = await fetch(`/api/modules/${moduleId}/lessons`);
                const lessons = await response.json();
                currentLessons = lessons;
                
                const progressResponse = await fetch(`/api/progress/${userId}/${moduleId}`);
                const progress = await progressResponse.json();
                
                document.getElementById('module-progress-container').style.display = 'block';
                document.getElementById('module-progress-fill').style.width = `${progress.percentage}%`;
                document.getElementById('module-progress-text').textContent = `${progress.completed}/${progress.total} lessons completed`;
                
                const lessonsList = document.getElementById('lessons-list');
                lessonsList.innerHTML = '';
                
                if (lessons.length === 0) {
                    lessonsList.innerHTML = '<div class="loading">No lessons yet. Content coming soon!</div>';
                } else {
                    lessons.sort((a, b) => (a.order || 0) - (b.order || 0));
                    lessons.forEach(lesson => {
                        const isCompleted = progress.completedLessons?.includes(lesson.id);
                        const lessonDiv = document.createElement('div');
                        lessonDiv.className = `lesson-item ${isCompleted ? 'lesson-completed' : ''}`;
                        lessonDiv.innerHTML = `
                            <div>
                                <strong>${lesson.order || 1}. ${escapeHtml(lesson.title)}</strong>
                                <br>
                                <small style="color: #9a9a9a;">${lesson.contentType === 'youtube' ? 'Video Lesson' : lesson.contentType} | ${lesson.duration || 'N/A'}</small>
                            </div>
                            ${isCompleted ? '<span class="complete-badge">Completed</span>' : ''}
                        `;
                        lessonDiv.onclick = () => playLesson(lesson);
                        lessonsList.appendChild(lessonDiv);
                    });
                }
                
                document.getElementById('courses-section').classList.add('hidden');
                document.getElementById('lessons-section').classList.remove('hidden');
                document.getElementById('player-section').classList.add('hidden');
                
            } catch (error) {
                console.error('Error loading lessons:', error);
            }
        }
        
        function playLesson(lesson) {
            currentLesson = lesson;
            
            // Reset tracking variables
            watchedSeconds = 0;
            watchPercentage = 0;
            isTracking = false;
            if (watchInterval) clearInterval(watchInterval);
            
            document.getElementById('lesson-title').textContent = lesson.title;
            const playerDiv = document.getElementById('lesson-player');
            const markBtn = document.getElementById('mark-complete-btn');
            markBtn.disabled = true;
            markBtn.style.opacity = '0.5';
            
            if (lesson.contentType === 'youtube') {
                // Parse duration to seconds
                if (lesson.duration) {
                    const match = lesson.duration.match(/(\d+)/);
                    if (match) {
                        totalDuration = parseInt(match[1]) * 60;
                    } else {
                        totalDuration = 300;
                    }
                } else {
                    totalDuration = 300;
                }
                
                playerDiv.innerHTML = `
                    <div id="youtube-player" style="width: 100%; aspect-ratio: 16/9;"></div>
                    <div class="watch-progress">
                        <div class="watch-progress-bar-container">
                            <div class="watch-progress-fill" id="watch-progress-fill"></div>
                        </div>
                        <div class="watch-progress-stats">
                            <span class="watch-progress-label">Watch Progress</span>
                            <span class="watch-progress-percent" id="watch-progress-percent">0%</span>
                        </div>
                    </div>
                    <div style="margin-top: 20px;">
                        <p>${escapeHtml(lesson.title)}</p>
                        <p style="color: #9a9a9a; font-size: 0.85rem;">${lesson.duration || 'N/A'}</p>
                    </div>
                `;
                
                // Load YouTube API if not already loaded
                if (typeof YT === 'undefined') {
                    const tag = document.createElement('script');
                    tag.src = 'https://www.youtube.com/iframe_api';
                    const firstScriptTag = document.getElementsByTagName('script')[0];
                    firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);
                    
                    window.onYouTubeIframeAPIReady = () => {
                        createYouTubePlayer(lesson);
                    };
                } else {
                    createYouTubePlayer(lesson);
                }
            } else {
                playerDiv.innerHTML = `<div style="padding: 40px; text-align: center;">Content type: ${lesson.contentType}</div>`;
                markBtn.disabled = false;
                markBtn.style.opacity = '1';
            }
            
            document.getElementById('courses-section').classList.add('hidden');
            document.getElementById('lessons-section').classList.add('hidden');
            document.getElementById('player-section').classList.remove('hidden');
        }
        
        function createYouTubePlayer(lesson) {
            youtubePlayer = new YT.Player('youtube-player', {
                height: '100%',
                width: '100%',
                videoId: lesson.youtubeId,
                playerVars: {
                    controls: 1,
                    modestbranding: 1,
                    rel: 0,
                    showinfo: 0
                },
                events: {
                    'onReady': onPlayerReady,
                    'onStateChange': onPlayerStateChange
                }
            });
        }
        
        function onPlayerReady(event) {
            totalDuration = event.target.getDuration();
            console.log('Video duration:', totalDuration, 'seconds');
        }
        
        function onPlayerStateChange(event) {
            const markBtn = document.getElementById('mark-complete-btn');
            
            if (event.data === YT.PlayerState.PLAYING) {
                if (!isTracking) {
                    isTracking = true;
                    watchInterval = setInterval(() => {
                        if (youtubePlayer && typeof youtubePlayer.getCurrentTime === 'function') {
                            const currentTime = youtubePlayer.getCurrentTime();
                            watchedSeconds = currentTime;
                            watchPercentage = (watchedSeconds / totalDuration) * 100;
                            
                            const progressFill = document.getElementById('watch-progress-fill');
                            const percentSpan = document.getElementById('watch-progress-percent');
                            
                            if (progressFill) {
                                progressFill.style.width = `${Math.min(watchPercentage, 100)}%`;
                            }
                            if (percentSpan) {
                                percentSpan.textContent = `${Math.min(Math.floor(watchPercentage), 100)}%`;
                            }
                            
                            if (watchPercentage >= 90 && markBtn) {
                                markBtn.disabled = false;
                                markBtn.style.opacity = '1';
                                clearInterval(watchInterval);
                                isTracking = false;
                            }
                        }
                    }, 3000);
                }
            } else if (event.data === YT.PlayerState.PAUSED || event.data === YT.PlayerState.ENDED) {
                if (watchInterval) {
                    clearInterval(watchInterval);
                    isTracking = false;
                }
            }
        }
        
        document.getElementById('mark-complete-btn')?.addEventListener('click', async () => {
            if (!currentLesson) return;
            
            if (currentLesson.contentType === 'youtube' && watchPercentage < 90) {
                alert('Please watch at least 90% of the video before marking complete.');
                return;
            }
            
            try {
                const response = await fetch('/api/progress/mark-complete', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        userId: userId,
                        lessonId: currentLesson.id,
                        moduleId: currentCourse?.module_id || currentCourse?.moduleId,
                        timeSpent: Math.floor(watchedSeconds),
                        watchPercentage: Math.floor(watchPercentage)
                    })
                });
                
                if (response.ok) {
                    const btn = document.getElementById('mark-complete-btn');
                    btn.textContent = 'Completed';
                    btn.disabled = true;
                    btn.style.opacity = '0.5';
                    
                    if (currentCourse) {
                        showCourse(currentCourse);
                    }
                } else {
                    const error = await response.json();
                    alert(error.error || 'Failed to mark complete. Please watch the video properly.');
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Error saving progress. Please try again.');
            }
        });
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        document.getElementById('back-to-courses')?.addEventListener('click', () => {
            document.getElementById('courses-section').classList.remove('hidden');
            document.getElementById('lessons-section').classList.add('hidden');
            document.getElementById('player-section').classList.add('hidden');
            loadCourses();
        });
        
        document.getElementById('back-to-lessons')?.addEventListener('click', () => {
            if (currentCourse) {
                showCourse(currentCourse);
            }
        });
        
        loadCourses();
        
        const stars = document.querySelectorAll('#helpful-stars .star');
        stars.forEach(star => {
            star.onclick = () => {
                selectedRating = parseInt(star.dataset.value);
                stars.forEach(s => {
                    if (parseInt(s.dataset.value) <= selectedRating) {
                        s.style.color = '#c9a03d';
                    } else {
                        s.style.color = '#ddd';
                    }
                });
            };
        });
        
        window.submitFeedback = async function() {
            const moduleId = window.currentFeedbackModule;
            const confusion = document.getElementById('confusion').value;
            const suggestions = document.getElementById('suggestions').value;
            
            try {
                await fetch('/api/feedback', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        userId: userId,
                        moduleId: moduleId,
                        rating: selectedRating,
                        confusion: confusion,
                        suggestions: suggestions
                    })
                });
                closeFeedbackModal();
            } catch (error) {
                console.error('Error:', error);
            }
        };
        
        window.closeFeedbackModal = function() {
            document.getElementById('feedbackModal').style.display = 'none';
            selectedRating = 0;
            document.getElementById('confusion').value = '';
            document.getElementById('suggestions').value = '';
            const stars = document.querySelectorAll('#helpful-stars .star');
            stars.forEach(s => s.style.color = '#ddd');
        };
    </script>
</body>
</html>
