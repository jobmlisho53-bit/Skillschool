<script>
    // SOLUTION: Track unique segments watched (prevents seeking)
    let watchedSegments = new Set(); // Set of segment indices watched
    let segmentDuration = 10; // 10-second segments
    let totalSegments = 0;
    let lastReportedPosition = 0;
    let seekDetectionCount = 0;
    
    function updateWatchedSegments(currentTime) {
        const segmentIndex = Math.floor(currentTime / segmentDuration);
        if (segmentIndex >= 0 && segmentIndex < totalSegments) {
            watchedSegments.add(segmentIndex);
        }
    }
    
    function calculateUniqueWatchPercentage() {
        const uniqueSegmentsWatched = watchedSegments.size;
        const percentage = (uniqueSegmentsWatched / totalSegments) * 100;
        return Math.min(percentage, 100);
    }
    
    function onPlayerStateChange(event) {
        const markBtn = document.getElementById('mark-complete-btn');
        
        if (event.data === YT.PlayerState.PLAYING) {
            if (!isTracking) {
                isTracking = true;
                
                // Set up progress tracking interval
                watchInterval = setInterval(() => {
                    if (youtubePlayer && typeof youtubePlayer.getCurrentTime === 'function') {
                        const currentTime = youtubePlayer.getCurrentTime();
                        
                        // Detect seeking (large jump forward)
                        if (lastReportedPosition > 0 && currentTime > lastReportedPosition + 5) {
                            seekDetectionCount++;
                            console.warn(`Seek detected! Jumped from ${lastReportedPosition} to ${currentTime}`);
                            
                            if (seekDetectionCount >= 3) {
                                // Flag as cheating
                                markBtn.disabled = true;
                                markBtn.title = "Cheating detected: Please don't skip ahead";
                                alert("Warning: Skipping ahead in videos is not allowed. Please watch continuously.");
                            }
                        }
                        
                        // Update watched segments
                        updateWatchedSegments(currentTime);
                        
                        // Also track time between intervals (continuous watching)
                        const timeDelta = currentTime - lastReportedPosition;
                        if (timeDelta > 0 && timeDelta < 5) {
                            // Smooth playback - add intermediate segments
                            const startSegment = Math.floor(lastReportedPosition / segmentDuration);
                            const endSegment = Math.floor(currentTime / segmentDuration);
                            for (let i = startSegment; i <= endSegment; i++) {
                                if (i >= 0 && i < totalSegments) {
                                    watchedSegments.add(i);
                                }
                            }
                        }
                        
                        lastReportedPosition = currentTime;
                        watchedSeconds = currentTime;
                        watchPercentage = calculateUniqueWatchPercentage();
                        
                        // Update progress bar
                        const progressFill = document.getElementById('watch-progress-fill');
                        const percentSpan = document.getElementById('watch-progress-percent');
                        const uniquePercentSpan = document.getElementById('unique-watch-percent');
                        
                        if (progressFill) {
                            progressFill.style.width = `${Math.min(watchPercentage, 100)}%`;
                        }
                        if (percentSpan) {
                            percentSpan.textContent = `${Math.min(Math.floor(watchPercentage), 100)}%`;
                        }
                        if (uniquePercentSpan) {
                            uniquePercentSpan.textContent = `${Math.min(Math.floor(watchPercentage), 100)}%`;
                        }
                        
                        // Enable complete button only when unique watch percentage reaches 90%
                        if (watchPercentage >= 90 && markBtn) {
                            markBtn.disabled = false;
                            markBtn.style.opacity = '1';
                            clearInterval(watchInterval);
                            isTracking = false;
                        }
                    }
                }, 2000); // Check every 2 seconds
            }
        } else if (event.data === YT.PlayerState.PAUSED) {
            if (watchInterval) {
                clearInterval(watchInterval);
                isTracking = false;
            }
        } else if (event.data === YT.PlayerState.ENDED) {
            if (watchInterval) {
                clearInterval(watchInterval);
                isTracking = false;
            }
            // Ensure final segments are counted
            if (totalSegments > 0) {
                for (let i = 0; i < totalSegments; i++) {
                    watchedSegments.add(i);
                }
                watchPercentage = 100;
            }
        }
    }
    
    function onPlayerReady(event) {
        totalDuration = event.target.getDuration();
        totalSegments = Math.ceil(totalDuration / segmentDuration);
        watchedSegments.clear();
        lastReportedPosition = 0;
        seekDetectionCount = 0;
        console.log(`Video duration: ${totalDuration}s, Total segments: ${totalSegments}`);
    }
    
    // Also add server-side validation
    async function completeLessonDirect() {
        // Send both watch percentage and segment coverage
        const uniqueWatchPercentage = calculateUniqueWatchPercentage();
        
        const token = await getRequestToken(currentLesson.id);
        if (!token) return;
        
        try {
            const response = await fetch('/api/progress/mark-complete', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    userId: userId,
                    lessonId: currentLesson.id,
                    moduleId: currentCourse?.module_id || currentCourse?.moduleId,
                    timeSpent: Math.floor(watchedSeconds),
                    watchPercentage: Math.floor(uniqueWatchPercentage),
                    segmentsWatched: Array.from(watchedSegments),
                    totalSegments: totalSegments,
                    sessionId: sessionId,
                    deviceFingerprint: deviceFingerprint,
                    requestToken: token
                })
            });
            
            if (response.ok) {
                const btn = document.getElementById('mark-complete-btn');
                btn.textContent = 'Completed';
                btn.disabled = true;
                btn.style.opacity = '0.5';
                
                if (currentCourse) {
                    showCourse(currentCourse);
                }
            } else {
                const error = await response.json();
                alert(error.error || 'Failed to mark complete. Please watch the video properly without skipping.');
            }
        } catch (error) {
            console.error('Error:', error);
            alert('Error saving progress. Please try again.');
        }
    }
    
    // Update the playLesson function to reset tracking
    function playLesson(lesson) {
        currentLesson = lesson;
        
        // Reset tracking variables
        watchedSeconds = 0;
        watchPercentage = 0;
        isTracking = false;
        watchedSegments.clear();
        lastReportedPosition = 0;
        seekDetectionCount = 0;
        totalSegments = 0;
        
        if (watchInterval) clearInterval(watchInterval);
        
        // ... rest of existing playLesson code
    }
</script>
