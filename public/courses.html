<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Income School - Professional Skills Mastery</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        /* CSS Variables for Theme Support */
        :root {
            /* Light Mode (Default) */
            --bg-primary: #ffffff;
            --bg-secondary: #fefcf8;
            --bg-card: #ffffff;
            --text-primary: #1a1a1a;
            --text-secondary: #6b6b6b;
            --text-muted: #9a9a9a;
            --border-light: rgba(212, 175, 55, 0.15);
            --border-medium: rgba(212, 175, 55, 0.3);
            --gold: #c9a03d;
            --gold-light: #f5e6b8;
            --warning-bg: #fff3cd;
            --warning-text: #856404;
            --warning-border: #ffc107;
            --success-bg: #c6f6d5;
            --success-text: #22543d;
            --error-bg: #fed7d7;
            --error-text: #742a2a;
            --progress-bg: #f0f0f0;
            --overlay-bg: rgba(0,0,0,0.5);
        }
        
        [data-theme="dark"] {
            --bg-primary: #1a1a2e;
            --bg-secondary: #16213e;
            --bg-card: #0f3460;
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --text-muted: #808080;
            --border-light: rgba(212, 175, 55, 0.25);
            --border-medium: rgba(212, 175, 55, 0.4);
            --gold: #d4af37;
            --gold-light: #f5e6b8;
            --warning-bg: #2c2c1a;
            --warning-text: #ffd966;
            --warning-border: #ffc107;
            --success-bg: #1a3a2a;
            --success-text: #a5d6a5;
            --error-bg: #3a1a1a;
            --error-text: #ff9999;
            --progress-bg: #2a2a3e;
            --overlay-bg: rgba(0,0,0,0.7);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.5;
        }
        
        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 32px;
        }
        
        /* Theme Toggle Button */
        .theme-toggle {
            background: var(--bg-secondary);
            border: 1px solid var(--border-medium);
            border-radius: 40px;
            padding: 8px 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-primary);
            transition: all 0.3s;
        }
        
        .theme-toggle:hover {
            border-color: var(--gold);
            transform: scale(1.02);
        }
        
        .theme-icon {
            font-size: 18px;
        }
        
        .header {
            background: var(--bg-primary);
            border-bottom: 1px solid var(--border-light);
            padding: 20px 0;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
            background: var(--bg-primary);
        }
        
        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }
        
        .logo h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.6rem;
            font-weight: 600;
            background: linear-gradient(135deg, var(--gold), var(--gold-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .logo p {
            font-size: 0.7rem;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--gold);
        }
        
        /* Warning Banner (Non-Blocking) */
        .warning-banner {
            background: var(--warning-bg);
            border-left: 4px solid var(--warning-border);
            padding: 12px 20px;
            margin: 16px 0;
            border-radius: 6px;
            display: none;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
        }
        
        .warning-banner.show {
            display: flex;
        }
        
        .warning-text {
            color: var(--warning-text);
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .warning-dismiss {
            background: none;
            border: 1px solid var(--warning-border);
            color: var(--warning-text);
            padding: 4px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 11px;
            font-weight: 500;
        }
        
        .warning-dismiss:hover {
            background: var(--warning-border);
            color: var(--bg-primary);
        }
        
        /* Progress Slowdown Indicator */
        .progress-slowdown {
            font-size: 10px;
            color: var(--warning-text);
            margin-top: 4px;
            display: none;
        }
        
        .progress-slowdown.show {
            display: block;
        }
        
        /* Rest of existing styles with variables */
        .courses-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 32px; padding: 48px 0; }
        .course-card { background: var(--bg-card); border-radius: 8px; padding: 28px; transition: all 0.3s ease; border: 1px solid var(--border-light); cursor: pointer; position: relative; overflow: hidden; }
        .course-card::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 3px; background: linear-gradient(90deg, var(--gold), var(--gold-light)); transform: scaleX(0); transition: transform 0.3s ease; }
        .course-card:hover { transform: translateY(-4px); box-shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.08); border-color: var(--border-medium); }
        .course-card:hover::before { transform: scaleX(1); }
        .course-category { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; font-weight: 500; color: var(--gold); margin-bottom: 12px; }
        .course-card h3 { font-family: 'Cormorant Garamond', serif; font-size: 1.4rem; font-weight: 600; margin-bottom: 12px; color: var(--text-primary); }
        .course-description { color: var(--text-secondary); font-size: 0.85rem; line-height: 1.5; margin-bottom: 20px; }
        .progress-section { margin: 20px 0 16px; }
        .progress-bar-container { background: var(--progress-bg); border-radius: 2px; height: 2px; overflow: hidden; }
        .progress-bar-fill { background: linear-gradient(90deg, var(--gold), var(--gold-light)); height: 100%; transition: width 0.3s ease; border-radius: 2px; }
        .progress-text { font-size: 0.7rem; color: var(--gold); margin-top: 8px; text-align: right; font-weight: 500; }
        .course-meta { display: flex; justify-content: space-between; align-items: center; margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--border-light); }
        .course-duration { font-size: 0.75rem; color: var(--text-muted); }
        .start-link { font-size: 0.8rem; font-weight: 500; color: var(--gold); text-decoration: none; }
        .back-button { background: none; border: none; font-family: 'Inter', sans-serif; font-size: 0.8rem; font-weight: 500; color: var(--gold); cursor: pointer; padding: 12px 0; display: inline-flex; align-items: center; gap: 6px; margin: 24px 0 16px; }
        .lesson-item { background: var(--bg-card); padding: 20px; margin: 12px 0; border-radius: 6px; cursor: pointer; transition: all 0.2s; border: 1px solid var(--border-light); display: flex; justify-content: space-between; align-items: center; }
        .lesson-item:hover { border-color: var(--border-medium); background: var(--bg-secondary); }
        .lesson-completed { border-left: 2px solid var(--gold); background: var(--bg-secondary); }
        .complete-badge { background: var(--gold); color: #ffffff; padding: 4px 12px; border-radius: 2px; font-size: 0.65rem; font-weight: 500; }
        .lesson-content { background: var(--bg-card); border-radius: 8px; padding: 32px; margin: 24px 0; border: 1px solid var(--border-light); }
        .mark-complete-btn { background: var(--gold); color: #ffffff; border: none; padding: 14px 32px; border-radius: 2px; cursor: pointer; font-family: 'Inter', sans-serif; font-size: 0.8rem; font-weight: 500; letter-spacing: 0.5px; transition: all 0.2s; margin-top: 24px; }
        .mark-complete-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; margin: 24px 0; border-radius: 4px; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border-radius: 4px; }
        .watch-progress { margin-top: 12px; }
        .watch-progress-bar-container { background: var(--progress-bg); border-radius: 2px; height: 4px; }
        .watch-progress-fill { width: 0%; background: var(--gold); height: 100%; border-radius: 2px; transition: width 0.3s; }
        .watch-progress-stats { display: flex; justify-content: space-between; margin-top: 8px; }
        .watch-progress-label { font-size: 0.7rem; color: var(--text-muted); }
        .watch-progress-percent { font-size: 0.7rem; color: var(--gold); font-weight: 500; }
        .footer { background: var(--bg-primary); border-top: 1px solid var(--border-light); padding: 48px 0 32px; margin-top: 64px; }
        .footer-content { display: flex; justify-content: space-between; flex-wrap: wrap; gap: 32px; }
        .footer-links { display: flex; gap: 32px; flex-wrap: wrap; }
        .footer a { color: var(--text-secondary); text-decoration: none; font-size: 0.8rem; }
        .footer a:hover { color: var(--gold); }
        .copyright { font-size: 0.75rem; color: var(--text-muted); }
        .hidden { display: none !important; }
        .loading { text-align: center; padding: 60px; color: var(--gold); }
        
        @media (max-width: 768px) {
            .container { padding: 0 20px; }
            .courses-grid { grid-template-columns: 1fr; }
            .lesson-item { flex-direction: column; gap: 12px; text-align: center; }
            .footer-content { flex-direction: column; text-align: center; }
            .footer-links { justify-content: center; }
        }
    </style>
    <script> window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); }; </script>
    <script defer src="/_vercel/insights/script.js"></script>
    <script defer src="/_vercel/speed-insights/script.js"></script>
</head>
<body>
    <div class="header">
        <div class="container">
            <div class="header-content">
                <div class="logo">
                    <h1>Income School</h1>
                    <p>Professional Skills Mastery</p>
                </div>
                <button class="theme-toggle" id="themeToggle">
                    <span class="theme-icon">🌙</span>
                    <span id="theme-text">Dark Mode</span>
                </button>
            </div>
        </div>
    </div>

    <main class="container">
        <!-- Non-Blocking Warning Banner -->
        <div id="warning-banner" class="warning-banner">
            <div class="warning-text">
                ⚠️ <span id="warning-message">Skipping detected. Watch continuously for accurate progress.</span>
            </div>
            <button class="warning-dismiss" onclick="dismissWarning()">Got it, I'll watch properly</button>
        </div>

        <section id="courses-section">
            <div id="courses-container" class="courses-grid">
                <div class="loading">Loading courses...</div>
            </div>
        </section>

        <section id="lessons-section" class="hidden">
            <button id="back-to-courses" class="back-button">← Back to Courses</button>
            <h2 id="course-title" style="font-family: 'Cormorant Garamond', serif; font-size: 1.8rem; font-weight: 600;"></h2>
            <div id="course-description"></div>
            <div class="progress-section" id="module-progress-container" style="display: none;">
                <div class="progress-bar-container">
                    <div class="progress-bar-fill" id="module-progress-fill" style="width: 0%"></div>
                </div>
                <div class="progress-text" id="module-progress-text"></div>
            </div>
            <h3 style="margin: 32px 0 16px; font-weight: 500; font-size: 1rem; letter-spacing: 1px; color: var(--gold);">CURRICULUM</h3>
            <div id="lessons-list"></div>
        </section>

        <section id="player-section" class="hidden">
            <button id="back-to-lessons" class="back-button">← Back to Lessons</button>
            <h2 id="lesson-title" style="font-family: 'Cormorant Garamond', serif; font-size: 1.5rem; font-weight: 500;"></h2>
            <div id="lesson-player"></div>
            <div id="progress-slowdown" class="progress-slowdown">
                ⚡ Progress slowed due to skipping. Watch normally to restore full progress.
            </div>
            <button id="mark-complete-btn" class="mark-complete-btn">Mark as Complete</button>
        </section>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="copyright">© 2026 Income School. All rights reserved.</div>
                <div class="footer-links">
                    <a href="/privacy">Privacy</a>
                    <a href="/terms">Terms</a>
                    <a href="/contact">Contact</a>
                </div>
            </div>
        </div>
    </footer>

    <script>
        // ============ THEME MANAGEMENT ============
        function initTheme() {
            const savedTheme = localStorage.getItem('theme');
            const themeToggle = document.getElementById('themeToggle');
            const themeText = document.getElementById('theme-text');
            const themeIcon = document.querySelector('.theme-icon');
            
            if (savedTheme === 'dark') {
                document.documentElement.setAttribute('data-theme', 'dark');
                if (themeIcon) themeIcon.textContent = '☀️';
                if (themeText) themeText.textContent = 'Light Mode';
            } else {
                document.documentElement.setAttribute('data-theme', 'light');
                if (themeIcon) themeIcon.textContent = '🌙';
                if (themeText) themeText.textContent = 'Dark Mode';
            }
        }
        
        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const themeToggle = document.getElementById('themeToggle');
            const themeText = document.getElementById('theme-text');
            const themeIcon = document.querySelector('.theme-icon');
            
            if (currentTheme === 'dark') {
                document.documentElement.setAttribute('data-theme', 'light');
                localStorage.setItem('theme', 'light');
                if (themeIcon) themeIcon.textContent = '🌙';
                if (themeText) themeText.textContent = 'Dark Mode';
            } else {
                document.documentElement.setAttribute('data-theme', 'dark');
                localStorage.setItem('theme', 'dark');
                if (themeIcon) themeIcon.textContent = '☀️';
                if (themeText) themeText.textContent = 'Light Mode';
            }
        }
        
        document.getElementById('themeToggle')?.addEventListener('click', toggleTheme);
        initTheme();
        
        // ============ NON-BLOCKING CHEAT DETECTION ============
        let seekCount = 0;
        let progressMultiplier = 1.0;
        let warningShown = false;
        
        function showWarning(message) {
            const banner = document.getElementById('warning-banner');
            const warningMsg = document.getElementById('warning-message');
            if (banner && !warningShown) {
                warningMsg.textContent = message || 'Skipping detected. Watch continuously for accurate progress.';
                banner.classList.add('show');
                warningShown = true;
                
                // Auto-hide after 8 seconds
                setTimeout(() => {
                    if (banner) banner.classList.remove('show');
                    setTimeout(() => { warningShown = false; }, 1000);
                }, 8000);
            }
        }
        
        function dismissWarning() {
            const banner = document.getElementById('warning-banner');
            if (banner) {
                banner.classList.remove('show');
                warningShown = false;
            }
            // Reset seek count after user acknowledges
            seekCount = 0;
            progressMultiplier = 1.0;
            const slowdownDiv = document.getElementById('progress-slowdown');
            if (slowdownDiv) slowdownDiv.classList.remove('show');
        }
        
        function applyProgressSlowdown() {
            progressMultiplier = 0.5;
            const slowdownDiv = document.getElementById('progress-slowdown');
            if (slowdownDiv) slowdownDiv.classList.add('show');
        }
        
        function resetProgressMultiplier() {
            progressMultiplier = 1.0;
            const slowdownDiv = document.getElementById('progress-slowdown');
            if (slowdownDiv) slowdownDiv.classList.remove('show');
        }
        
        // ============ MAIN APPLICATION ============
        let currentCourse = null;
        let currentLesson = null;
        let currentLessons = [];
        let userId = null;
        
        let youtubePlayer = null;
        let watchInterval = null;
        let watchedSeconds = 0;
        let totalDuration = 0;
        let watchPercentage = 0;
        let isTracking = false;
        let lastPosition = 0;
        
        function getUserId() {
            let id = localStorage.getItem('user_id');
            if (!id) {
                id = 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
                localStorage.setItem('user_id', id);
            }
            return id;
        }
        
        userId = getUserId();
        
        async function loadCourses() {
            try {
                const response = await fetch('/api/modules');
                const courses = await response.json();
                const container = document.getElementById('courses-container');
                
                if (courses.length === 0) {
                    container.innerHTML = '<div class="loading">No courses available yet. Check back soon!</div>';
                    return;
                }
                
                container.innerHTML = '';
                
                for (const course of courses) {
                    const moduleId = course.module_id || course.moduleId;
                    const progress = await getModuleProgress(moduleId);
                    
                    const card = document.createElement('div');
                    card.className = 'course-card';
                    card.onclick = () => showCourse(course);
                    
                    card.innerHTML = `
                        <div class="course-category">${course.category || 'Professional Course'}</div>
                        <h3>${escapeHtml(course.title)}</h3>
                        <p class="course-description">${escapeHtml(course.description || 'Master this professional skill with our comprehensive curriculum.')}</p>
                        <div class="progress-section">
                            <div class="progress-bar-container">
                                <div class="progress-bar-fill" style="width: ${progress.percentage}%"></div>
                            </div>
                            <div class="progress-text">${progress.completed}/${progress.total} lessons completed</div>
                        </div>
                        <div class="course-meta">
                            <span class="course-duration">${escapeHtml(course.estimatedTime || 'Self-paced')}</span>
                            <span class="start-link">Continue →</span>
                        </div>
                    `;
                    container.appendChild(card);
                }
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('courses-container').innerHTML = '<div class="loading">Unable to load courses. Please refresh the page.</div>';
            }
        }
        
        async function getModuleProgress(moduleId) {
            try {
                const response = await fetch(`/api/progress/${userId}/${moduleId}`);
                const data = await response.json();
                return data;
            } catch (error) {
                return { total: 0, completed: 0, percentage: 0 };
            }
        }
        
        async function showCourse(course) {
            currentCourse = course;
            const moduleId = course.module_id || course.moduleId;
            
            document.getElementById('course-title').textContent = course.title;
            document.getElementById('course-description').innerHTML = `
                <div style="background: var(--bg-secondary); padding: 24px; border-radius: 4px; margin: 20px 0; border-left: 2px solid var(--gold);">
                    <p>${escapeHtml(course.description || 'No description available')}</p>
                    <p style="margin-top: 12px;"><strong>Estimated time:</strong> ${escapeHtml(course.estimatedTime || 'Self-paced')}</p>
                </div>
            `;
            
            try {
                const response = await fetch(`/api/modules/${moduleId}/lessons`);
                const lessons = await response.json();
                currentLessons = lessons;
                
                const progressResponse = await fetch(`/api/progress/${userId}/${moduleId}`);
                const progress = await progressResponse.json();
                
                document.getElementById('module-progress-container').style.display = 'block';
                document.getElementById('module-progress-fill').style.width = `${progress.percentage}%`;
                document.getElementById('module-progress-text').textContent = `${progress.completed}/${progress.total} lessons completed`;
                
                const lessonsList = document.getElementById('lessons-list');
                lessonsList.innerHTML = '';
                
                if (lessons.length === 0) {
                    lessonsList.innerHTML = '<div class="loading">No lessons yet. Content coming soon!</div>';
                } else {
                    lessons.sort((a, b) => (a.order || 0) - (b.order || 0));
                    lessons.forEach(lesson => {
                        const isCompleted = progress.completedLessons?.includes(lesson.id);
                        const lessonDiv = document.createElement('div');
                        lessonDiv.className = `lesson-item ${isCompleted ? 'lesson-completed' : ''}`;
                        lessonDiv.innerHTML = `
                            <div>
                                <strong>${lesson.order || 1}. ${escapeHtml(lesson.title)}</strong>
                                <br>
                                <small style="color: var(--text-muted);">${lesson.contentType === 'youtube' ? 'Video Lesson' : lesson.contentType} | ${lesson.duration || 'N/A'}</small>
                            </div>
                            ${isCompleted ? '<span class="complete-badge">Completed</span>' : ''}
                        `;
                        lessonDiv.onclick = () => playLesson(lesson);
                        lessonsList.appendChild(lessonDiv);
                    });
                }
                
                document.getElementById('courses-section').classList.add('hidden');
                document.getElementById('lessons-section').classList.remove('hidden');
                document.getElementById('player-section').classList.add('hidden');
                
            } catch (error) {
                console.error('Error loading lessons:', error);
            }
        }
        
        function playLesson(lesson) {
            currentLesson = lesson;
            
            watchedSeconds = 0;
            watchPercentage = 0;
            isTracking = false;
            lastPosition = 0;
            seekCount = 0;
            progressMultiplier = 1.0;
            if (watchInterval) clearInterval(watchInterval);
            
            document.getElementById('lesson-title').textContent = lesson.title;
            const playerDiv = document.getElementById('lesson-player');
            const markBtn = document.getElementById('mark-complete-btn');
            markBtn.disabled = false;
            markBtn.style.opacity = '1';
            
            if (lesson.contentType === 'youtube') {
                if (lesson.duration) {
                    const match = lesson.duration.match(/(\d+)/);
                    if (match) {
                        totalDuration = parseInt(match[1]) * 60;
                    } else {
                        totalDuration = 300;
                    }
                } else {
                    totalDuration = 300;
                }
                
                playerDiv.innerHTML = `
                    <div id="youtube-player" style="width: 100%; aspect-ratio: 16/9;"></div>
                    <div class="watch-progress">
                        <div class="watch-progress-bar-container">
                            <div class="watch-progress-fill" id="watch-progress-fill"></div>
                        </div>
                        <div class="watch-progress-stats">
                            <span class="watch-progress-label">Watch Progress</span>
                            <span class="watch-progress-percent" id="watch-progress-percent">0%</span>
                        </div>
                    </div>
                    <div style="margin-top: 20px;">
                        <p>${escapeHtml(lesson.title)}</p>
                        <p style="color: var(--text-muted); font-size: 0.85rem;">${lesson.duration || 'N/A'}</p>
                    </div>
                `;
                
                if (typeof YT === 'undefined') {
                    const tag = document.createElement('script');
                    tag.src = 'https://www.youtube.com/iframe_api';
                    const firstScriptTag = document.getElementsByTagName('script')[0];
                    firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);
                    
                    window.onYouTubeIframeAPIReady = () => {
                        createYouTubePlayer(lesson);
                    };
                } else {
                    createYouTubePlayer(lesson);
                }
            } else {
                playerDiv.innerHTML = `<div style="padding: 40px; text-align: center;">Content type: ${lesson.contentType}</div>`;
            }
            
            document.getElementById('courses-section').classList.add('hidden');
            document.getElementById('lessons-section').classList.add('hidden');
            document.getElementById('player-section').classList.remove('hidden');
        }
        
        function createYouTubePlayer(lesson) {
            youtubePlayer = new YT.Player('youtube-player', {
                height: '100%',
                width: '100%',
                videoId: lesson.youtubeId,
                playerVars: { controls: 1, modestbranding: 1, rel: 0, showinfo: 0 },
                events: {
                    'onReady': onPlayerReady,
                    'onStateChange': onPlayerStateChange
                }
            });
        }
        
        function onPlayerReady(event) {
            totalDuration = event.target.getDuration();
            console.log('Video duration:', totalDuration, 'seconds');
        }
        
        function onPlayerStateChange(event) {
            const markBtn = document.getElementById('mark-complete-btn');
            
            if (event.data === YT.PlayerState.PLAYING) {
                if (!isTracking) {
                    isTracking = true;
                    
                    watchInterval = setInterval(() => {
                        if (youtubePlayer && typeof youtubePlayer.getCurrentTime === 'function') {
                            const currentTime = youtubePlayer.getCurrentTime();
                            
                            // NON-BLOCKING: Detect skipping but don't block
                            if (lastPosition > 0 && currentTime > lastPosition + 10) {
                                seekCount++;
                                console.log(`Seek detected: ${lastPosition} → ${currentTime} (count: ${seekCount})`);
                                
                                if (seekCount >= 2 && progressMultiplier === 1.0) {
                                    applyProgressSlowdown();
                                    showWarning('Skipping detected. Progress will be slower until you watch normally.');
                                }
                            }
                            
                            // Gradually recover from slowdown if watching normally
                            if (progressMultiplier < 1.0 && currentTime - lastPosition < 3 && currentTime > lastPosition) {
                                seekCount = Math.max(0, seekCount - 0.5);
                                if (seekCount < 1) {
                                    resetProgressMultiplier();
                                    showWarning('✓ Watching normally. Progress restored!', true);
                                }
                            }
                            
                            lastPosition = currentTime;
                            
                            // Calculate progress with multiplier (never zero, just slower)
                            const rawProgress = (currentTime / totalDuration) * 100;
                            const effectiveProgress = Math.min(rawProgress * progressMultiplier, 100);
                            watchPercentage = effectiveProgress;
                            
                            const progressFill = document.getElementById('watch-progress-fill');
                            const percentSpan = document.getElementById('watch-progress-percent');
                            
                            if (progressFill) {
                                progressFill.style.width = `${effectiveProgress}%`;
                            }
                            if (percentSpan) {
                                percentSpan.textContent = `${Math.floor(effectiveProgress)}%`;
                            }
                            
                            // Enable at 90% - ALWAYS ENABLED regardless of cheating
                            if (effectiveProgress >= 90 && markBtn) {
                                markBtn.disabled = false;
                                markBtn.style.opacity = '1';
                            }
                        }
                    }, 2000);
                }
            } else if (event.data === YT.PlayerState.PAUSED || event.data === YT.PlayerState.ENDED) {
                if (watchInterval) {
                    clearInterval(watchInterval);
                    isTracking = false;
                }
            }
        }
        
        document.getElementById('mark-complete-btn')?.addEventListener('click', async () => {
            if (!currentLesson) return;
            
            try {
                const response = await fetch('/api/progress/mark-complete', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        userId: userId,
                        lessonId: currentLesson.id,
                        moduleId: currentCourse?.module_id || currentCourse?.moduleId,
                        timeSpent: Math.floor(watchedSeconds),
                        watchPercentage: Math.floor(watchPercentage)
                    })
                });
                
                if (response.ok) {
                    const btn = document.getElementById('mark-complete-btn');
                    btn.textContent = 'Completed';
                    btn.disabled = true;
                    btn.style.opacity = '0.5';
                    
                    if (currentCourse) {
                        showCourse(currentCourse);
                    }
                } else {
                    const error = await response.json();
                    alert(error.error || 'Failed to mark complete.');
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Error saving progress. Please try again.');
            }
        });
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        document.getElementById('back-to-courses')?.addEventListener('click', () => {
            document.getElementById('courses-section').classList.remove('hidden');
            document.getElementById('lessons-section').classList.add('hidden');
            document.getElementById('player-section').classList.add('hidden');
            loadCourses();
        });
        
        document.getElementById('back-to-lessons')?.addEventListener('click', () => {
            if (currentCourse) {
                showCourse(currentCourse);
            }
        });
        
        loadCourses();
    </script>
</body>
</html>
