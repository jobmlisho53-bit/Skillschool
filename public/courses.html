<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Income School - Professional Skills Mastery</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        /* CSS Variables for Theme Support */
        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #fefcf8;
            --bg-card: #ffffff;
            --text-primary: #1a1a1a;
            --text-secondary: #6b6b6b;
            --text-muted: #9a9a9a;
            --border-light: rgba(212, 175, 55, 0.15);
            --border-medium: rgba(212, 175, 55, 0.3);
            --gold: #c9a03d;
            --gold-light: #f5e6b8;
            --warning-bg: #fff3cd;
            --warning-text: #856404;
            --warning-border: #ffc107;
            --progress-bg: #f0f0f0;
        }
        
        [data-theme="dark"] {
            --bg-primary: #1a1a2e;
            --bg-secondary: #16213e;
            --bg-card: #0f3460;
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --text-muted: #808080;
            --border-light: rgba(212, 175, 55, 0.25);
            --border-medium: rgba(212, 175, 55, 0.4);
            --gold: #d4af37;
            --gold-light: #f5e6b8;
            --warning-bg: #2c2c1a;
            --warning-text: #ffd966;
            --warning-border: #ffc107;
            --progress-bg: #2a2a3e;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-primary); color: var(--text-primary); line-height: 1.5; }
        .container { max-width: 1280px; margin: 0 auto; padding: 0 32px; }
        
        .theme-toggle { background: var(--bg-secondary); border: 1px solid var(--border-medium); border-radius: 40px; padding: 8px 16px; cursor: pointer; display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 500; color: var(--text-primary); }
        .header { background: var(--bg-primary); border-bottom: 1px solid var(--border-light); padding: 20px 0; position: sticky; top: 0; z-index: 100; backdrop-filter: blur(10px); }
        .header-content { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 20px; }
        .logo h1 { font-family: 'Cormorant Garamond', serif; font-size: 1.6rem; font-weight: 600; background: linear-gradient(135deg, var(--gold), var(--gold-light)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .logo p { font-size: 0.7rem; letter-spacing: 1.5px; text-transform: uppercase; color: var(--gold); }
        
        .warning-banner { background: var(--warning-bg); border-left: 4px solid var(--warning-border); padding: 12px 20px; margin: 16px 0; border-radius: 6px; display: none; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
        .warning-banner.show { display: flex; }
        .warning-text { color: var(--warning-text); font-size: 13px; display: flex; align-items: center; gap: 8px; }
        .warning-dismiss { background: none; border: 1px solid var(--warning-border); color: var(--warning-text); padding: 4px 12px; border-radius: 20px; cursor: pointer; font-size: 11px; }
        
        .courses-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 32px; padding: 48px 0; }
        .course-card { background: var(--bg-card); border-radius: 8px; padding: 28px; transition: all 0.3s ease; border: 1px solid var(--border-light); cursor: pointer; position: relative; overflow: hidden; }
        .course-card::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 3px; background: linear-gradient(90deg, var(--gold), var(--gold-light)); transform: scaleX(0); transition: transform 0.3s ease; }
        .course-card:hover { transform: translateY(-4px); border-color: var(--border-medium); }
        .course-card:hover::before { transform: scaleX(1); }
        .course-category { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; font-weight: 500; color: var(--gold); margin-bottom: 12px; }
        .course-card h3 { font-family: 'Cormorant Garamond', serif; font-size: 1.4rem; font-weight: 600; margin-bottom: 12px; color: var(--text-primary); }
        .course-description { color: var(--text-secondary); font-size: 0.85rem; line-height: 1.5; margin-bottom: 20px; }
        .progress-section { margin: 20px 0 16px; }
        .progress-bar-container { background: var(--progress-bg); border-radius: 2px; height: 2px; overflow: hidden; }
        .progress-bar-fill { background: linear-gradient(90deg, var(--gold), var(--gold-light)); height: 100%; transition: width 0.3s ease; }
        .progress-text { font-size: 0.7rem; color: var(--gold); margin-top: 8px; text-align: right; font-weight: 500; }
        .course-meta { display: flex; justify-content: space-between; align-items: center; margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--border-light); }
        .course-duration { font-size: 0.75rem; color: var(--text-muted); }
        .start-link { font-size: 0.8rem; font-weight: 500; color: var(--gold); text-decoration: none; }
        .back-button { background: none; border: none; font-family: 'Inter', sans-serif; font-size: 0.8rem; font-weight: 500; color: var(--gold); cursor: pointer; padding: 12px 0; display: inline-flex; align-items: center; gap: 6px; margin: 24px 0 16px; }
        .lesson-item { background: var(--bg-card); padding: 20px; margin: 12px 0; border-radius: 6px; cursor: pointer; transition: all 0.2s; border: 1px solid var(--border-light); display: flex; justify-content: space-between; align-items: center; }
        .lesson-item:hover { border-color: var(--border-medium); background: var(--bg-secondary); }
        .lesson-completed { border-left: 2px solid var(--gold); background: var(--bg-secondary); }
        .complete-badge { background: var(--gold); color: #ffffff; padding: 4px 12px; border-radius: 2px; font-size: 0.65rem; font-weight: 500; }
        .lesson-content { background: var(--bg-card); border-radius: 8px; padding: 32px; margin: 24px 0; border: 1px solid var(--border-light); }
        .mark-complete-btn { background: var(--gold); color: #ffffff; border: none; padding: 14px 32px; border-radius: 2px; cursor: pointer; font-family: 'Inter', sans-serif; font-size: 0.8rem; font-weight: 500; margin-top: 24px; }
        .mark-complete-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; margin: 24px 0; border-radius: 4px; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border-radius: 4px; }
        .watch-progress { margin-top: 12px; }
        .watch-progress-bar-container { background: var(--progress-bg); border-radius: 2px; height: 4px; }
        .watch-progress-fill { width: 0%; background: var(--gold); height: 100%; border-radius: 2px; transition: width 0.3s; }
        .watch-progress-stats { display: flex; justify-content: space-between; margin-top: 8px; }
        .watch-progress-label { font-size: 0.7rem; color: var(--text-muted); }
        .watch-progress-percent { font-size: 0.7rem; color: var(--gold); font-weight: 500; }
        .progress-slowdown { font-size: 10px; color: var(--warning-text); margin-top: 4px; display: none; }
        .progress-slowdown.show { display: block; }
        
        .footer { background: var(--bg-primary); border-top: 1px solid var(--border-light); padding: 48px 0 32px; margin-top: 64px; }
        .footer-content { display: flex; justify-content: space-between; flex-wrap: wrap; gap: 32px; }
        .footer-links { display: flex; gap: 32px; flex-wrap: wrap; }
        .footer a { color: var(--text-secondary); text-decoration: none; font-size: 0.8rem; }
        .footer a:hover { color: var(--gold); }
        .copyright { font-size: 0.75rem; color: var(--text-muted); }
        .hidden { display: none !important; }
        .loading { text-align: center; padding: 60px; color: var(--gold); }
        
        @media (max-width: 768px) {
            .container { padding: 0 20px; }
            .courses-grid { grid-template-columns: 1fr; }
            .lesson-item { flex-direction: column; gap: 12px; text-align: center; }
            .footer-content { flex-direction: column; text-align: center; }
            .footer-links { justify-content: center; }
        }
    </style>
    <script> window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); }; </script>
    <script defer src="/_vercel/insights/script.js"></script>
    <script defer src="/_vercel/speed-insights/script.js"></script>
</head>
<body>
    <div class="header">
        <div class="container">
            <div class="header-content">
                <div class="logo">
                    <h1>Income School</h1>
                    <p>Professional Skills Mastery</p>
                </div>
                <button class="theme-toggle" id="themeToggle">
                    <span class="theme-icon">🌙</span>
                    <span id="theme-text">Dark Mode</span>
                </button>
            </div>
        </div>
    </div>

    <main class="container">
        <div id="warning-banner" class="warning-banner">
            <div class="warning-text">⚠️ <span id="warning-message">Skipping detected. Watch continuously for accurate progress.</span></div>
            <button class="warning-dismiss" onclick="dismissWarning()">Got it, I'll watch properly</button>
        </div>

        <section id="courses-section"><div id="courses-container" class="courses-grid"><div class="loading">Loading courses...</div></div></section>
        <section id="lessons-section" class="hidden">
            <button id="back-to-courses" class="back-button">← Back to Courses</button>
            <h2 id="course-title" style="font-family: 'Cormorant Garamond', serif; font-size: 1.8rem; font-weight: 600;"></h2>
            <div id="course-description"></div>
            <div class="progress-section" id="module-progress-container" style="display: none;">
                <div class="progress-bar-container"><div class="progress-bar-fill" id="module-progress-fill" style="width: 0%"></div></div>
                <div class="progress-text" id="module-progress-text"></div>
            </div>
            <h3 style="margin: 32px 0 16px; font-weight: 500; font-size: 1rem; letter-spacing: 1px; color: var(--gold);">CURRICULUM</h3>
            <div id="lessons-list"></div>
        </section>
        <section id="player-section" class="hidden">
            <button id="back-to-lessons" class="back-button">← Back to Lessons</button>
            <h2 id="lesson-title" style="font-family: 'Cormorant Garamond', serif; font-size: 1.5rem; font-weight: 500;"></h2>
            <div id="lesson-player"></div>
            <div id="progress-slowdown" class="progress-slowdown">⚡ Progress slowed due to skipping. Watch normally to restore full progress.</div>
            <button id="mark-complete-btn" class="mark-complete-btn">Mark as Complete</button>
        </section>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="copyright">© 2026 Income School. All rights reserved.</div>
                <div class="footer-links">
                    <a href="/privacy">Privacy</a>
                    <a href="/terms">Terms</a>
                    <a href="/contact">Contact</a>
                </div>
            </div>
        </div>
    </footer>

    <script>
        // Theme Management
        function initTheme() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark') {
                document.documentElement.setAttribute('data-theme', 'dark');
                document.querySelector('.theme-icon').textContent = '☀️';
                document.getElementById('theme-text').textContent = 'Light Mode';
            }
        }
        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            if (currentTheme === 'dark') {
                document.documentElement.setAttribute('data-theme', 'light');
                localStorage.setItem('theme', 'light');
                document.querySelector('.theme-icon').textContent = '🌙';
                document.getElementById('theme-text').textContent = 'Dark Mode';
            } else {
                document.documentElement.setAttribute('data-theme', 'dark');
                localStorage.setItem('theme', 'dark');
                document.querySelector('.theme-icon').textContent = '☀️';
                document.getElementById('theme-text').textContent = 'Light Mode';
            }
        }
        document.getElementById('themeToggle')?.addEventListener('click', toggleTheme);
        initTheme();
        
        // ============ VIDEO CLEANUP ON NAVIGATION ============
        let youtubePlayer = null;
        let watchInterval = null;
        let isTracking = false;
        
        function destroyYouTubePlayer() {
            if (youtubePlayer) {
                try {
                    youtubePlayer.stopVideo();
                    youtubePlayer.destroy();
                } catch(e) { console.log('Player destroy error:', e); }
                youtubePlayer = null;
            }
            if (watchInterval) { clearInterval(watchInterval); watchInterval = null; }
            isTracking = false;
            const playerDiv = document.getElementById('lesson-player');
            if (playerDiv) playerDiv.innerHTML = '';
            console.log('Video player destroyed');
        }
        
        // ============ NON-BLOCKING CHEAT DETECTION ============
        let seekCount = 0;
        let progressMultiplier = 1.0;
        let warningShown = false;
        
        function showWarning(message) {
            const banner = document.getElementById('warning-banner');
            if (banner && !warningShown) {
                document.getElementById('warning-message').textContent = message || 'Skipping detected. Watch continuously for accurate progress.';
                banner.classList.add('show');
                warningShown = true;
                setTimeout(() => { banner.classList.remove('show'); setTimeout(() => { warningShown = false; }, 1000); }, 8000);
            }
        }
        
        function dismissWarning() {
            const banner = document.getElementById('warning-banner');
            if (banner) banner.classList.remove('show');
            warningShown = false;
            seekCount = 0;
            progressMultiplier = 1.0;
            document.getElementById('progress-slowdown')?.classList.remove('show');
        }
        
        // ============ MAIN APPLICATION ============
        let currentCourse = null, currentLesson = null, userId = null;
        let watchedSeconds = 0, totalDuration = 0, watchPercentage = 0, lastPosition = 0;
        
        function getUserId() {
            let id = localStorage.getItem('user_id');
            if (!id) id = 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
            return id;
        }
        userId = getUserId();
        
        async function loadCourses() {
            try {
                const res = await fetch('/api/modules');
                const courses = await res.json();
                const container = document.getElementById('courses-container');
                if (courses.length === 0) { container.innerHTML = '<div class="loading">No courses available.</div>'; return; }
                container.innerHTML = '';
                for (const course of courses) {
                    const moduleId = course.module_id || course.moduleId;
                    const progress = await (await fetch(`/api/progress/${userId}/${moduleId}`)).json();
                    const card = document.createElement('div');
                    card.className = 'course-card';
                    card.onclick = () => showCourse(course);
                    card.innerHTML = `<div class="course-category">${course.category || 'Professional Course'}</div><h3>${escapeHtml(course.title)}</h3><p class="course-description">${escapeHtml(course.description || 'Master this skill.')}</p><div class="progress-section"><div class="progress-bar-container"><div class="progress-bar-fill" style="width: ${progress.percentage}%"></div></div><div class="progress-text">${progress.completed}/${progress.total} lessons completed</div></div><div class="course-meta"><span class="course-duration">${escapeHtml(course.estimatedTime || 'Self-paced')}</span><span class="start-link">Continue →</span></div>`;
                    container.appendChild(card);
                }
            } catch(e) { console.error(e); }
        }
        
        async function showCourse(course) {
            destroyYouTubePlayer();
            currentCourse = course;
            const moduleId = course.module_id || course.moduleId;
            document.getElementById('course-title').textContent = course.title;
            document.getElementById('course-description').innerHTML = `<div style="background: var(--bg-secondary); padding: 24px; border-radius: 4px; margin: 20px 0; border-left: 2px solid var(--gold);"><p>${escapeHtml(course.description || 'No description')}</p><p style="margin-top: 12px;"><strong>Estimated time:</strong> ${escapeHtml(course.estimatedTime || 'Self-paced')}</p></div>`;
            const lessons = await (await fetch(`/api/modules/${moduleId}/lessons`)).json();
            const progress = await (await fetch(`/api/progress/${userId}/${moduleId}`)).json();
            document.getElementById('module-progress-container').style.display = 'block';
            document.getElementById('module-progress-fill').style.width = `${progress.percentage}%`;
            document.getElementById('module-progress-text').textContent = `${progress.completed}/${progress.total} lessons completed`;
            const lessonsList = document.getElementById('lessons-list');
            lessonsList.innerHTML = '';
            lessons.sort((a,b) => (a.order||0)-(b.order||0));
            lessons.forEach(lesson => {
                const isCompleted = progress.completedLessons?.includes(lesson.id);
                const div = document.createElement('div');
                div.className = `lesson-item ${isCompleted ? 'lesson-completed' : ''}`;
                div.innerHTML = `<div><strong>${lesson.order||1}. ${escapeHtml(lesson.title)}</strong><br><small style="color: var(--text-muted);">${lesson.contentType === 'youtube' ? 'Video Lesson' : lesson.contentType} | ${lesson.duration || 'N/A'}</small></div>${isCompleted ? '<span class="complete-badge">Completed</span>' : ''}`;
                div.onclick = () => playLesson(lesson);
                lessonsList.appendChild(div);
            });
            document.getElementById('courses-section').classList.add('hidden');
            document.getElementById('lessons-section').classList.remove('hidden');
            document.getElementById('player-section').classList.add('hidden');
        }
        
        function playLesson(lesson) {
            destroyYouTubePlayer();
            currentLesson = lesson;
            watchedSeconds = 0; watchPercentage = 0; lastPosition = 0; seekCount = 0; progressMultiplier = 1.0;
            document.getElementById('lesson-title').textContent = lesson.title;
            const playerDiv = document.getElementById('lesson-player');
            const markBtn = document.getElementById('mark-complete-btn');
            markBtn.disabled = false;
            
            if (lesson.contentType === 'youtube') {
                totalDuration = (lesson.duration?.match(/(\d+)/)?.[1] || 5) * 60;
                playerDiv.innerHTML = `<div id="youtube-player" style="width:100%;aspect-ratio:16/9;"></div><div class="watch-progress"><div class="watch-progress-bar-container"><div class="watch-progress-fill" id="watch-progress-fill"></div></div><div class="watch-progress-stats"><span class="watch-progress-label">Watch Progress</span><span class="watch-progress-percent" id="watch-progress-percent">0%</span></div></div><div style="margin-top:20px;"><p>${escapeHtml(lesson.title)}</p><p style="color:var(--text-muted);font-size:0.85rem;">${lesson.duration || 'N/A'}</p></div>`;
                if (typeof YT === 'undefined') {
                    const tag = document.createElement('script');
                    tag.src = 'https://www.youtube.com/iframe_api';
                    document.head.appendChild(tag);
                    window.onYouTubeIframeAPIReady = () => createYouTubePlayer(lesson);
                } else { createYouTubePlayer(lesson); }
            } else {
                playerDiv.innerHTML = `<div style="padding:40px;text-align:center;">Content type: ${lesson.contentType}</div>`;
            }
            document.getElementById('courses-section').classList.add('hidden');
            document.getElementById('lessons-section').classList.add('hidden');
            document.getElementById('player-section').classList.remove('hidden');
        }
        
        function createYouTubePlayer(lesson) {
            youtubePlayer = new YT.Player('youtube-player', {
                height: '100%', width: '100%', videoId: lesson.youtubeId,
                playerVars: { controls: 1, modestbranding: 1, rel: 0 },
                events: { 'onReady': (e) => { totalDuration = e.target.getDuration(); },
                    'onStateChange': (e) => {
                        if (e.data === YT.PlayerState.PLAYING && !isTracking) {
                            isTracking = true;
                            watchInterval = setInterval(() => {
                                if (youtubePlayer && typeof youtubePlayer.getCurrentTime === 'function') {
                                    const ct = youtubePlayer.getCurrentTime();
                                    if (lastPosition > 0 && ct > lastPosition + 10) {
                                        seekCount++;
                                        if (seekCount >= 2 && progressMultiplier === 1.0) {
                                            progressMultiplier = 0.5;
                                            document.getElementById('progress-slowdown')?.classList.add('show');
                                            showWarning('Skipping detected. Progress will be slower until you watch normally.');
                                        }
                                    }
                                    if (progressMultiplier < 1.0 && ct - lastPosition < 3 && ct > lastPosition) {
                                        seekCount = Math.max(0, seekCount - 0.5);
                                        if (seekCount < 1) {
                                            progressMultiplier = 1.0;
                                            document.getElementById('progress-slowdown')?.classList.remove('show');
                                        }
                                    }
                                    lastPosition = ct;
                                    watchPercentage = Math.min((ct / totalDuration) * 100 * progressMultiplier, 100);
                                    document.getElementById('watch-progress-fill').style.width = `${watchPercentage}%`;
                                    document.getElementById('watch-progress-percent').textContent = `${Math.floor(watchPercentage)}%`;
                                    if (watchPercentage >= 90) {
                                        document.getElementById('mark-complete-btn').disabled = false;
                                        clearInterval(watchInterval);
                                        isTracking = false;
                                    }
                                }
                            }, 2000);
                        } else if (e.data === YT.PlayerState.PAUSED && watchInterval) {
                            clearInterval(watchInterval); isTracking = false;
                        }
                    }
                }
            });
        }
        
        document.getElementById('mark-complete-btn')?.addEventListener('click', async () => {
            if (!currentLesson) return;
            const res = await fetch('/api/progress/mark-complete', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userId, lessonId: currentLesson.id, moduleId: currentCourse?.module_id || currentCourse?.moduleId, timeSpent: Math.floor(watchedSeconds), watchPercentage: Math.floor(watchPercentage) })
            });
            if (res.ok) {
                document.getElementById('mark-complete-btn').textContent = 'Completed';
                document.getElementById('mark-complete-btn').disabled = true;
                if (currentCourse) showCourse(currentCourse);
            } else alert('Failed to mark complete');
        });
        
        function escapeHtml(t) { if (!t) return ''; const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
        
        document.getElementById('back-to-courses')?.addEventListener('click', () => { destroyYouTubePlayer(); document.getElementById('courses-section').classList.remove('hidden'); document.getElementById('lessons-section').classList.add('hidden'); document.getElementById('player-section').classList.add('hidden'); loadCourses(); });
        document.getElementById('back-to-lessons')?.addEventListener('click', () => { destroyYouTubePlayer(); if (currentCourse) showCourse(currentCourse); });
        window.addEventListener('beforeunload', () => { if (youtubePlayer) youtubePlayer.stopVideo(); });
        document.addEventListener('visibilitychange', () => { if (document.hidden && youtubePlayer) youtubePlayer.pauseVideo(); });
        
        loadCourses();
    </script>
</body>
</html>
<style>
    /* Skeleton Loading Styles */
    .skeleton {
        background: linear-gradient(
            90deg,
            var(--bg-card) 0%,
            var(--bg-secondary) 50%,
            var(--bg-card) 100%
        );
        background-size: 200% 100%;
        animation: skeleton-loading 1.5s infinite;
        border-radius: 8px;
    }
    
    @keyframes skeleton-loading {
        0% { background-position: 200% 0; }
        100% { background-position: -200% 0; }
    }
    
    .skeleton-card {
        background: var(--bg-card);
        border-radius: 8px;
        padding: 28px;
        border: 1px solid var(--border-light);
    }
    
    .skeleton-title {
        height: 28px;
        width: 70%;
        margin-bottom: 12px;
    }
    
    .skeleton-text {
        height: 16px;
        width: 100%;
        margin-bottom: 8px;
    }
    
    .skeleton-text-short {
        width: 60%;
    }
    
    .skeleton-progress {
        height: 2px;
        width: 100%;
        margin: 20px 0 16px;
    }
    
    .skeleton-meta {
        height: 20px;
        width: 40%;
        margin-top: 20px;
    }
    
    .skeleton-lesson {
        height: 70px;
        width: 100%;
        margin: 12px 0;
        border-radius: 6px;
    }
    
    /* Grid layout for skeletons */
    .skeleton-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
        gap: 32px;
        padding: 48px 0;
    }
    
    /* Skeleton for lessons list */
    .skeleton-lessons-list {
        margin-top: 20px;
    }
    
    /* Hide content until loaded */
    .content-loaded {
        display: block;
    }
    
    .skeleton-placeholder {
        display: none;
    }

<script>
    // Helper functions for skeleton loading
    function showSkeleton(type) {
        if (type === 'courses') {
            const skeleton = document.getElementById('courses-skeleton');
            const container = document.getElementById('courses-container');
            if (skeleton) skeleton.classList.add('active');
            if (container) container.style.display = 'none';
        } else if (type === 'lessons') {
            const skeleton = document.getElementById('lessons-skeleton');
            const content = document.getElementById('lessons-content');
            if (skeleton) skeleton.classList.add('active');
            if (content) content.style.display = 'none';
        }
    }
    
    function hideSkeleton(type) {
        if (type === 'courses') {
            const skeleton = document.getElementById('courses-skeleton');
            const container = document.getElementById('courses-container');
            if (skeleton) skeleton.classList.remove('active');
            if (container) container.style.display = 'block';
        } else if (type === 'lessons') {
            const skeleton = document.getElementById('lessons-skeleton');
            const content = document.getElementById('lessons-content');
            if (skeleton) skeleton.classList.remove('active');
            if (content) content.style.display = 'block';
        }
    }
    
    // Updated loadCourses with skeleton
    async function loadCourses() {
        showSkeleton('courses');
        try {
            const response = await fetch('/api/modules');
            const courses = await response.json();
            const container = document.getElementById('courses-container');
            
            if (courses.length === 0) {
                container.innerHTML = '<div class="loading">No courses available yet. Check back soon!</div>';
                hideSkeleton('courses');
                return;
            }
            
            container.innerHTML = '';
            
            for (const course of courses) {
                const moduleId = course.module_id || course.moduleId;
                const progress = await getModuleProgress(moduleId);
                
                const card = document.createElement('div');
                card.className = 'course-card';
                card.onclick = () => showCourse(course);
                
                card.innerHTML = `
                    <div class="course-category">${course.category || 'Professional Course'}</div>
                    <h3>${escapeHtml(course.title)}</h3>
                    <p class="course-description">${escapeHtml(course.description || 'Master this professional skill with our comprehensive curriculum.')}</p>
                    <div class="progress-section">
                        <div class="progress-bar-container">
                            <div class="progress-bar-fill" style="width: ${progress.percentage}%"></div>
                        </div>
                        <div class="progress-text">${progress.completed}/${progress.total} lessons completed</div>
                    </div>
                    <div class="course-meta">
                        <span class="course-duration">${escapeHtml(course.estimatedTime || 'Self-paced')}</span>
                        <span class="start-link">Continue →</span>
                    </div>
                `;
                container.appendChild(card);
            }
            
            hideSkeleton('courses');
        } catch (error) {
            console.error('Error:', error);
            const container = document.getElementById('courses-container');
            container.innerHTML = '<div class="loading">Unable to load courses. Please refresh the page.</div>';
            hideSkeleton('courses');
        }
    }
    
    // Updated showCourse with skeleton
    async function showCourse(course) {
        destroyYouTubePlayer();
        currentCourse = course;
        const moduleId = course.module_id || course.moduleId;
        
        // Show skeleton, hide content
        showSkeleton('lessons');
        
        // Update static content immediately
        document.getElementById('course-title').textContent = course.title;
        document.getElementById('course-description').innerHTML = `
            <div style="background: var(--bg-secondary); padding: 24px; border-radius: 4px; margin: 20px 0; border-left: 2px solid var(--gold);">
                <p>${escapeHtml(course.description || 'No description available')}</p>
                <p style="margin-top: 12px;"><strong>Estimated time:</strong> ${escapeHtml(course.estimatedTime || 'Self-paced')}</p>
            </div>
        `;
        
        try {
            // Fetch lessons and progress in parallel for faster loading
            const [lessonsResponse, progressResponse] = await Promise.all([
                fetch(`/api/modules/${moduleId}/lessons`),
                fetch(`/api/progress/${userId}/${moduleId}`)
            ]);
            
            const lessons = await lessonsResponse.json();
            const progress = await progressResponse.json();
            currentLessons = lessons;
            
            // Update progress bar
            document.getElementById('module-progress-container').style.display = 'block';
            document.getElementById('module-progress-fill').style.width = `${progress.percentage}%`;
            document.getElementById('module-progress-text').textContent = `${progress.completed}/${progress.total} lessons completed`;
            
            // Build lessons list
            const lessonsList = document.getElementById('lessons-list');
            lessonsList.innerHTML = '';
            
            if (lessons.length === 0) {
                lessonsList.innerHTML = '<div class="loading">No lessons yet. Content coming soon!</div>';
            } else {
                lessons.sort((a, b) => (a.order || 0) - (b.order || 0));
                lessons.forEach(lesson => {
                    const isCompleted = progress.completedLessons?.includes(lesson.id);
                    const lessonDiv = document.createElement('div');
                    lessonDiv.className = `lesson-item ${isCompleted ? 'lesson-completed' : ''}`;
                    lessonDiv.innerHTML = `
                        <div>
                            <strong>${lesson.order || 1}. ${escapeHtml(lesson.title)}</strong>
                            <br>
                            <small style="color: var(--text-muted);">${lesson.contentType === 'youtube' ? 'Video Lesson' : lesson.contentType} | ${lesson.duration || 'N/A'}</small>
                        </div>
                        ${isCompleted ? '<span class="complete-badge">Completed</span>' : ''}
                    `;
                    lessonDiv.onclick = () => playLesson(lesson);
                    lessonsList.appendChild(lessonDiv);
                });
            }
            
            // Hide skeleton, show content
            hideSkeleton('lessons');
            
            // Switch views
            document.getElementById('courses-section').classList.add('hidden');
            document.getElementById('lessons-section').classList.remove('hidden');
            document.getElementById('player-section').classList.add('hidden');
            
        } catch (error) {
            console.error('Error loading lessons:', error);
            document.getElementById('lessons-list').innerHTML = '<div class="loading">Error loading lessons. Please refresh.</div>';
            hideSkeleton('lessons');
        }
    }
    
    // Add skeleton for module progress loading
    async function getModuleProgress(moduleId) {
        try {
            const response = await fetch(`/api/progress/${userId}/${moduleId}`);
            return await response.json();
        } catch (error) {
            return { total: 0, completed: 0, percentage: 0 };
        }
    }
</script>
